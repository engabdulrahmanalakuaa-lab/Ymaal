name: Build & Release EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4
        
      - name: تثبيت Node.js النظيف
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # تم إزالة أي إشارة للـ cache لمنع السيرفر من استدعاء الحزم المعطوبة القديمة
          
      - name: إعادة بناء ملف الحزم وتجاوز فحص النزاهة
        run: |
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }
          if (Test-Path package-lock.json) { Remove-Item -Force package-lock.json }
          npm install --no-audit --no-fund --prefer-online
        
      - name: إعادة بناء native modules
        run: npx electron-builder install-app-deps
        
      - name: بناء EXE
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: رفع EXE كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: تقنيات-سوفت-مطاعم-Installer
          path: dist/*.exe
