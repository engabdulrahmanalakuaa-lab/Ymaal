<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقنيات سوفت - نظام إدارة المطاعم</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap');
        :root {
            --primary: #d35400;
            --primary-light: #e67e22;
            --bg: #f4f6f9;
            --card: #ffffff;
            --text: #2c3e50;
            --sidebar-bg: #2c3e50;
            --sidebar-text: #ecf0f1;
        }
        body { display: flex; height: 100vh; overflow: hidden; background: var(--bg); }
        .sidebar {
            width: 240px; background: var(--sidebar-bg); color: var(--sidebar-text);
            display: flex; flex-direction: column; padding: 15px 0; transition: 0.3s;
        }
        .sidebar .logo { display: flex; align-items: center; gap: 10px; padding: 0 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .sidebar .logo i { font-size: 28px; color: var(--primary-light); }
        .sidebar .logo h2 { font-size: 20px; font-weight: 800; }
        .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 4px; padding: 0 10px; }
        .nav-btn {
            display: flex; align-items: center; gap: 10px; padding: 12px 15px;
            background: transparent; border: none; color: var(--sidebar-text); font-size: 15px;
            border-radius: 8px; cursor: pointer; transition: 0.2s; text-align: right;
        }
        .nav-btn i { width: 20px; text-align: center; }
        .nav-btn:hover { background: rgba(255,255,255,0.1); }
        .nav-btn.active { background: var(--primary-light); color: #fff; font-weight: 700; }
        .user-info { display: flex; align-items: center; gap: 10px; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto; }
        .user-info i { font-size: 30px; color: var(--primary-light); }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-header h1 { font-size: 24px; color: var(--text); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 12px; }
        .stat-icon { font-size: 28px; color: var(--primary-light); }
        .stat-info h3 { font-size: 13px; color: #7f8c8d; margin-bottom: 4px; }
        .stat-info p { font-size: 20px; font-weight: 700; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e0e0e0; }
        th { background: #f8f9fa; font-weight: 700; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--primary-light); color: #fff; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-sm { padding: 4px 10px; font-size: 13px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 10px; padding: 25px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #bdc3c7; border-radius: 6px; font-size: 14px; }
        .pos-container { display: flex; gap: 20px; height: calc(100vh - 150px); }
        .menu-section { flex: 1; background: var(--card); border-radius: 10px; padding: 15px; display: flex; flex-direction: column; }
        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
        .cat-btn { padding: 12px; border: 2px solid var(--primary-light); border-radius: 8px; background: white; cursor: pointer; font-weight: 700; }
        .cat-btn.active { background: var(--primary-light); color: white; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; overflow-y: auto; flex: 1; }
        .item-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; }
        .item-card:hover { border-color: var(--primary-light); }
        .invoice-section { width: 380px; background: var(--card); border-radius: 10px; padding: 15px; display: flex; flex-direction: column; }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .cart-total { font-size: 20px; font-weight: 800; padding: 10px 0; border-top: 2px solid var(--primary-light); }
        .stock-danger { background-color: #fadbd8; font-weight: bold; }
        .alert-warning { background: #fef3cd; border: 1px solid #f39c12; padding: 10px; border-radius: 6px; margin: 10px 0; }
        @media print {
            body * { visibility: hidden; }
            #thermal-receipt, #shift-report-receipt { visibility: visible; position: absolute; left: 0; top: 0; width: 74mm; margin: 0; padding: 5mm; font-size: 12px; background: white; color: black; direction: rtl; }
        }
        /* لوحة المفاتيح */
        #virtual-keyboard {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #f0f0f0;
            border-top: 2px solid #ccc; padding: 10px; z-index: 9999; direction: ltr;
        }
        .kb-btn {
            font-size: 18px; min-width: 40px; cursor: pointer; touch-action: manipulation;
            background: white; border: 1px solid #ccc; border-radius: 6px; padding: 10px;
        }
        .kb-btn:active { opacity: 0.7; }
        @media (max-width: 600px) {
            .kb-btn { font-size: 14px; min-width: 30px; padding: 8px 5px; }
        }
    </style>
</head>
<body>
    <!-- شاشة التفعيل -->
    <div id="activation-screen" style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #2c3e50; color: white;">
        <div style="background: white; color: #2c3e50; padding: 30px; border-radius: 10px; text-align: center; max-width: 400px;">
            <h2>تفعيل نظام تقنيات سوفت</h2>
            <p>أدخل كود التفعيل (15 رقماً)</p>
            <input type="text" id="activation-code" placeholder="أدخل كود التفعيل (15 رقماً)" style="padding: 10px; margin: 10px 0; width: 100%; font-size: 18px; text-align: center;">
            <button onclick="activateApp()" class="btn btn-primary" style="width:100%; font-size: 16px;">تفعيل</button>
            <p style="margin-top:10px; font-size:12px;">تصميم م/ عبدالرحمن الاكوع 773579486 967+</p>
        </div>
    </div>

    <!-- التطبيق الرئيسي (يظهر بعد التفعيل) -->
    <div id="app-main" style="display: none; width: 100%;">
        <!-- شاشة تسجيل الدخول المخصصة -->
        <div id="login-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(44,62,80,0.95); justify-content:center; align-items:center; z-index:9999; flex-direction:column;">
            <div style="background:white; padding:30px; border-radius:10px; text-align:center; min-width:300px;">
                <h2 style="margin-bottom:20px; color:#2c3e50;">تسجيل الدخول</h2>
                <div class="form-group">
                    <input type="text" id="login-username" placeholder="اسم المستخدم" style="padding:10px; width:100%; margin-bottom:10px;">
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" placeholder="كلمة المرور" style="padding:10px; width:100%; margin-bottom:10px;">
                </div>
                <button class="btn btn-primary" onclick="submitLogin()" style="width:100%;">دخول</button>
                <p style="margin-top:15px; font-size:12px; color:#7f8c8d;">تصميم م/ عبدالرحمن الاكوع 773579486 967+</p>
            </div>
        </div>

        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <h2>تقنيات سوفت</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-tab="dashboard"><i class="fas fa-tachometer-alt"></i> لوحة التحكم</button>
                <button class="nav-btn" data-tab="pos"><i class="fas fa-cash-register"></i> نقطة البيع</button>
                <button class="nav-btn" data-tab="products"><i class="fas fa-boxes"></i> المنتجات</button>
                <button class="nav-btn" data-tab="categories"><i class="fas fa-tags"></i> الأقسام</button>
                <button class="nav-btn" data-tab="materials"><i class="fas fa-cubes"></i> المواد الخام</button>
                <button class="nav-btn" data-tab="tables"><i class="fas fa-chair"></i> الطاولات</button>
                <button class="nav-btn" data-tab="waiters"><i class="fas fa-user-tie"></i> الكباتن</button>
                <button class="nav-btn" data-tab="reports"><i class="fas fa-chart-line"></i> التقارير</button>
                <button class="nav-btn" data-tab="financial"><i class="fas fa-calculator"></i> التحليل المالي</button>
                <button class="nav-btn" data-tab="accounting"><i class="fas fa-book"></i> المحاسبة</button>
                <button class="nav-btn" data-tab="users"><i class="fas fa-users-cog"></i> المستخدمين</button>
                <button class="nav-btn" data-tab="settings"><i class="fas fa-cog"></i> الإعدادات</button>
            </nav>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="current-user-display">مدير النظام</span>
            </div>
        </aside>
        <main class="main-content" id="main-content"></main>
    </div>

    <!-- النافذة المنبثقة -->
    <div id="modal" class="modal">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <!-- لوحة المفاتيح الافتراضية -->
    <div id="virtual-keyboard" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#f0f0f0; border-top:2px solid #ccc; padding:10px; z-index:9999; direction:ltr;">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <button class="kb-btn kb-close" onclick="hideKeyboard()" style="background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:6px; font-weight:bold;">✕ إغلاق</button>
            <div>
                <button class="kb-btn kb-mode" data-mode="arabic" onclick="switchKBMode('arabic')" style="background:#3498db; color:white; border:none; padding:8px 12px; border-radius:6px; margin-right:5px;">عربي</button>
                <button class="kb-btn kb-mode" data-mode="english" onclick="switchKBMode('english')" style="background:#2ecc71; color:white; border:none; padding:8px 12px; border-radius:6px; margin-right:5px;">English</button>
                <button class="kb-btn kb-mode" data-mode="number" onclick="switchKBMode('number')" style="background:#f39c12; color:white; border:none; padding:8px 12px; border-radius:6px;">123</button>
            </div>
            <button class="kb-btn kb-backspace" onclick="kbBackspace()" style="background:#e67e22; color:white; border:none; padding:8px 15px; border-radius:6px; font-weight:bold;">⌫ مسح</button>
        </div>
        <div id="kb-keys-container" style="display:grid; grid-template-columns: repeat(10, 1fr); gap:5px;"></div>
        <div style="margin-top:5px; text-align:center;">
            <button class="kb-btn kb-space" onclick="kbInsert(' ')" style="background:#95a5a6; color:white; border:none; padding:10px 40px; border-radius:6px; font-weight:bold;">مسافة</button>
            <button class="kb-btn kb-enter" onclick="kbEnter()" style="background:#27ae60; color:white; border:none; padding:10px 40px; border-radius:6px; font-weight:bold; margin-left:10px;">↵ إدخال</button>
        </div>
    </div>

    <!-- إيصالات مخفية للطباعة -->
    <div id="thermal-receipt" style="display:none;"></div>
    <div id="shift-report-receipt" style="display:none;"></div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="preload.js"></script>
    <script src="renderer.js"></script>
</body>
</html>
